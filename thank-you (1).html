<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — NativeMind</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10;
    --accent: #00e5a0;
    --text: #f0f4f8;
    --muted: #7a8899;
    --border: rgba(255,255,255,0.07);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .icon {
    width: 80px;
    height: 80px;
    background: rgba(0,229,160,0.1);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    font-size: 2rem;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 3rem;
    display: block;
  }
  .logo span { color: var(--accent); }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    margin-bottom: 1rem;
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }
  p {
    color: var(--muted);
    font-size: 1.1rem;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
  }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #080c10;
    padding: 0.9rem 2rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .divider {
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 0 auto 2rem;
    border-radius: 2px;
  }
</style>
</head>
<body>
  <a class="logo" href="https://nativemind11.github.io/nativemind-ai-training-data-services1/">
    Native<span>Mind</span>
  </a>
  <div class="icon">✓</div>
  <h1>Thank You for <span>Reaching Out!</span></h1>
  <div class="divider"></div>
  <p>Your request has been received. The NativeMind team will review your project details and get back to you within <strong style="color:var(--text)">24 hours</strong> with a tailored proposal.</p>
  <a href="https://nativemind11.github.io/nativemind-ai-training-data-services1/" class="btn">← Back to NativeMind</a>
</body>
</html>
